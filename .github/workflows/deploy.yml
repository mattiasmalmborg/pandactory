# Deploy Pandactory to GitHub Pages
# Main site at: https://mattiasmalmborg.github.io/pandactory/
# Preview at:   https://mattiasmalmborg.github.io/pandactory/preview/
name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Restore preview from gh-pages
        run: |
          if git ls-remote --exit-code origin gh-pages >/dev/null 2>&1; then
            git fetch origin gh-pages --depth=1
            git show origin/gh-pages:preview/index.html >/dev/null 2>&1 && \
              git archive origin/gh-pages -- preview | tar -x -C dist || true
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
