# Deploy preview build for feature branches
# Preview URL: https://mattiasmalmborg.github.io/pandactory/preview/
#
# This workflow builds the feature branch and deploys it alongside the
# main site by rebuilding main + adding preview as a subfolder.
# Uses separate localStorage keys (pandactory-preview-*) to protect saves.
name: Deploy Preview

on:
  push:
    branches: ['feature/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}preview/
    steps:
      - name: Build main site
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-src

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: main-src/package-lock.json

      - name: Build main
        run: |
          cd main-src
          npm ci
          npm run build

      - name: Build preview site
        uses: actions/checkout@v4
        with:
          path: preview-src

      - name: Build preview
        run: |
          cd preview-src
          npm ci
          npm run build
        env:
          VITE_PREVIEW: 'true'
          VITE_BASE_PATH: '/pandactory/preview/'

      - name: Combine main + preview
        run: |
          cp -r preview-src/dist main-src/dist/preview

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: main-src/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
